<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalle de activo · Talleres</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/styles.css">
  <style>
    .det-cols { display: grid; grid-template-columns: 380px 1fr; gap: 22px; align-items: start; }
    .gallery .main-img { aspect-ratio: 4/3; border-radius: 12px; overflow: hidden; background: var(--bg-2); border: 1px solid var(--line); display: grid; place-items: center; }
    .gallery .main-img img { width: 100%; height: 100%; object-fit: cover; }
    .gallery .main-img .ph svg { width: 54px; height: 54px; color: var(--muted-2); }
    .gallery .thumbs { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
    .gallery .thumbs img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; border: 2px solid transparent; cursor: pointer; }
    .gallery .thumbs img.sel { border-color: var(--color-primary); }
    .specs { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
    .spec { padding: 13px 4px; border-bottom: 1px solid var(--line-2); }
    .spec .lb { font-size: 11.5px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted-2); font-weight: 600; margin-bottom: 3px; }
    .spec .vl { font-size: 14.5px; color: var(--ink); font-weight: 500; }
    .spec.full { grid-column: 1 / -1; }
    .qr-mini { display: flex; gap: 16px; align-items: center; }
    .qr-mini img { width: 120px; height: 120px; border: 1px solid var(--line); border-radius: 10px; padding: 6px; background: #fff; flex-shrink: 0; }
    @media (max-width: 860px) { .det-cols { grid-template-columns: 1fr; } .specs { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main">
      <header class="topbar" id="topbar"></header>
      <main class="content" id="content">
        <div class="row mb-2" style="gap:12px">
          <button class="icon-btn" onclick="location.href='inventario.html'" title="Volver"></button>
          <div style="flex:1"><div class="skel" style="height:24px;width:240px;margin-bottom:6px"></div><div class="skel" style="height:13px;width:140px"></div></div>
        </div>
        <div class="det-cols">
          <div><div class="skel" style="aspect-ratio:4/3;border-radius:12px"></div></div>
          <div class="panel"><div class="card-pad"><div class="skel" style="height:14px;width:90%;margin-bottom:12px"></div><div class="skel" style="height:14px;width:80%;margin-bottom:12px"></div><div class="skel" style="height:14px;width:85%"></div></div></div>
        </div>
      </main>
    </div>
  </div>

  <script src="../config.js"></script>
  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/ui.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/app.js"></script>
  <script>
    Shell.init({ active: 'inventario', title: 'Detalle de activo' });
    const id = new URLSearchParams(location.search).get('id');
    if (!id) location.href = 'inventario.html';

    (async () => {
      try {
        const a = await Api.get('/activos/' + id);
        render(a);
      } catch (e) {
        document.getElementById('content').innerHTML = `<div class="empty">${ICON.alert}<h3>No se pudo cargar el activo</h3><p>${UI.esc(e.message)}</p><a class="btn btn-ghost" href="inventario.html">Volver al inventario</a></div>`;
      }
    })();

    function render(a) {
      const puedeEditar = Auth.can('jefe_taller');
      const fotos = a.fotos || [];
      const principal = a.foto_principal_url || (fotos[0] && fotos[0].url) || null;

      const acciones = puedeEditar ? `
        <button class="btn btn-primary" onclick="location.href='activo-form.html?id=${a.id}'">${ICON.edit}<span>Editar</span></button>
        ${a.estado !== 'baja' ? `<button class="btn btn-ghost" id="btnBaja">${ICON.alert}<span>Dar de baja</span></button>` : ''}
        <button class="btn btn-danger" id="btnDel">${ICON.trash}<span>Eliminar</span></button>` : '';

      document.getElementById('content').innerHTML = `
        <div class="row mb-2 wrap" style="gap:12px">
          <button class="icon-btn" onclick="location.href='inventario.html'" title="Volver">${ICON.back}</button>
          <div style="flex:1;min-width:200px">
            <div class="row gap-sm" style="flex-wrap:wrap"><span class="code-chip">${UI.esc(a.codigo_interno)}</span>${UI.badge(a.estado)}</div>
            <h2 style="font-size:23px;margin-top:7px">${UI.esc(a.nombre)}</h2>
          </div>
          <div class="row gap-sm wrap">${acciones}</div>
        </div>

        <div class="det-cols">
          <div>
            <div class="gallery">
              <div class="main-img">${principal ? `<img id="mainImg" src="${UI.esc(principal)}" alt="">` : `<div class="ph">${ICON.image}</div>`}</div>
              ${fotos.length > 1 ? `<div class="thumbs">${fotos.map((f, i) => `<img src="${UI.esc(f.url)}" class="${(f.url === principal) ? 'sel' : ''}" onclick="cambiarImg(this,'${UI.esc(f.url)}')">`).join('')}</div>` : ''}
            </div>

            <div class="panel mt-2" id="qrPanel" style="display:none">
              <div class="panel-head"><h3>Etiqueta QR</h3></div>
              <div class="card-pad">
                <div class="qr-mini">
                  <img id="qrImg" alt="QR">
                  <div>
                    <div class="small muted" style="margin-bottom:10px">Consulta pública sin clave.</div>
                    <button class="btn btn-ghost btn-sm" id="btnDescQR">${ICON.download}<span>Descargar PNG</span></button>
                    <a class="btn btn-ghost btn-sm" id="linkPub" target="_blank" style="margin-top:6px">${ICON.qr}<span>Abrir ficha</span></a>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div style="display:flex;flex-direction:column;gap:20px">
            <div class="panel">
              <div class="panel-head"><h3>Especificaciones</h3></div>
              <div class="card-pad">
                <div class="specs">
                  ${spec('Categoría', a.categoria_nombre)}
                  ${spec('Taller / ubicación', a.taller_nombre)}
                  ${spec('Marca', a.marca)}
                  ${spec('Modelo', a.modelo)}
                  ${spec('Número de serie', a.numero_serie, true)}
                  ${spec('Código patrimonial', a.codigo_patrimonial, true)}
                  ${spec('Cantidad', a.cantidad)}
                  ${spec('Estado', UI.estadoLabel(a.estado))}
                  ${spec('Responsable', a.responsable)}
                  ${spec('Fecha de adquisición', UI.date(a.fecha_adquisicion))}
                  ${spec('Valor referencial', UI.money(a.valor_referencial))}
                </div>
              </div>
            </div>

            ${a.observaciones ? `<div class="panel"><div class="panel-head"><h3>Observaciones</h3></div><div class="card-pad"><p style="margin:0;white-space:pre-wrap;color:var(--ink-2)">${UI.esc(a.observaciones)}</p></div></div>` : ''}
            ${a.cuidado_mantenimiento ? `<div class="panel"><div class="panel-head"><h3>Cuidados y mantenimiento</h3></div><div class="card-pad"><p style="margin:0;white-space:pre-wrap;color:var(--ink-2)">${UI.esc(a.cuidado_mantenimiento)}</p></div></div>` : ''}

            <div class="row gap-sm wrap">
              <a class="btn btn-ghost btn-sm" href="prestamos.html?activo=${a.id}">${ICON.handshake}<span>Préstamos</span></a>
              <a class="btn btn-ghost btn-sm" href="mantenimiento.html?activo=${a.id}">${ICON.wrench}<span>Mantenimientos</span></a>
            </div>
          </div>
        </div>`;

      // QR
      if (a.qr_data_url) {
        document.getElementById('qrPanel').style.display = '';
        document.getElementById('qrImg').src = a.qr_data_url;
        document.getElementById('linkPub').href = a.url_publica;
        document.getElementById('btnDescQR').onclick = () => { const x = document.createElement('a'); x.href = a.qr_data_url; x.download = `qr_${a.codigo_interno}.png`; x.click(); };
      }

      // Acciones
      const bBaja = document.getElementById('btnBaja');
      if (bBaja) bBaja.onclick = async () => {
        if (!(await UI.confirm('¿Marcar este activo como dado de baja? Seguirá en el sistema pero como inactivo.', { ok: 'Dar de baja' }))) return;
        try { await Api.del(`/activos/${a.id}?baja=true`); UI.toast('Activo dado de baja.', 'ok'); setTimeout(() => location.reload(), 600); }
        catch (e) { UI.toast(e.message, 'err'); }
      };
      const bDel = document.getElementById('btnDel');
      if (bDel) bDel.onclick = async () => {
        if (!(await UI.confirm('¿Eliminar definitivamente este activo? Esta acción no se puede deshacer.', { danger: true, ok: 'Eliminar' }))) return;
        try { await Api.del(`/activos/${a.id}`); UI.toast('Activo eliminado.', 'ok'); setTimeout(() => location.href = 'inventario.html', 600); }
        catch (e) { UI.toast(e.message, 'err'); }
      };
    }

    function spec(lb, vl, mono) {
      const v = (vl === null || vl === undefined || vl === '') ? '—' : vl;
      return `<div class="spec"><div class="lb">${lb}</div><div class="vl ${mono ? 'mono' : ''}">${UI.esc(v)}</div></div>`;
    }
    window.cambiarImg = (el, url) => {
      document.getElementById('mainImg').src = url;
      document.querySelectorAll('.thumbs img').forEach((t) => t.classList.remove('sel'));
      el.classList.add('sel');
    };
  </script>
</body>
</html>
