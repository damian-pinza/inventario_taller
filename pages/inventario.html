<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventario · Talleres</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main">
      <header class="topbar" id="topbar"></header>
      <main class="content">

        <div class="toolbar">
          <div class="search">
            <span id="searchIcon"></span>
            <input type="search" id="q" placeholder="Buscar por código, nombre, marca o serie…">
          </div>
          <select id="fEstado" style="width:auto;min-width:150px">
            <option value="">Todos los estados</option>
            <option value="operativo">Operativo</option>
            <option value="mantenimiento">En mantenimiento</option>
            <option value="baja">Dado de baja</option>
          </select>
          <select id="fTaller" style="width:auto;min-width:160px"><option value="">Todos los talleres</option></select>
          <select id="fCategoria" style="width:auto;min-width:160px"><option value="">Todas las categorías</option></select>
          <div class="view-toggle">
            <button id="vCards" class="active" title="Tarjetas"></button>
            <button id="vTable" title="Tabla"></button>
          </div>
          <button class="btn btn-ghost" id="btnImportar" style="display:none"></button>
          <button class="btn btn-primary" id="btnNuevo" style="display:none"><span id="nuevoLbl">Nuevo activo</span></button>
        </div>

        <div id="resultados"></div>
        <div class="pager" id="pager" style="display:none">
          <div class="info" id="pagerInfo"></div>
          <div class="controls">
            <button class="btn btn-ghost btn-sm" id="prev">Anterior</button>
            <span class="small muted" id="pagNum"></span>
            <button class="btn btn-ghost btn-sm" id="next">Siguiente</button>
          </div>
        </div>

      </main>
    </div>
  </div>

  <script src="../config.js"></script>
  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/ui.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/app.js"></script>
  <script>
    Shell.init({ active: 'inventario', title: 'Inventario' });

    // Íconos
    document.getElementById('searchIcon').outerHTML = `<span>${ICON.search}</span>`;
    document.getElementById('vCards').innerHTML = ICON.grid;
    document.getElementById('vTable').innerHTML = ICON.list;
    document.getElementById('btnNuevo').innerHTML = ICON.plus + '<span>Nuevo activo</span>';

    // Solo jefe_taller+ puede crear
    if (Auth.can('jefe_taller')) document.getElementById('btnNuevo').style.display = '';
    document.getElementById('btnNuevo').onclick = () => location.href = 'activo-form.html';

    // Importación masiva (jefe+)
    document.getElementById('btnImportar').innerHTML = ICON.upload + '<span>Importar</span>';
    if (Auth.can('jefe_taller')) document.getElementById('btnImportar').style.display = '';
    document.getElementById('btnImportar').onclick = () => location.href = 'importar.html';

    let vista = localStorage.getItem('inv_vista') || 'cards';
    let page = 1, totalPaginas = 1, debounce;

    function setVista(v) {
      vista = v; localStorage.setItem('inv_vista', v);
      document.getElementById('vCards').classList.toggle('active', v === 'cards');
      document.getElementById('vTable').classList.toggle('active', v === 'table');
      cargar();
    }
    document.getElementById('vCards').onclick = () => setVista('cards');
    document.getElementById('vTable').onclick = () => setVista('table');

    // Cargar filtros (talleres y categorías)
    (async () => {
      try {
        const [tals, cats] = await Promise.all([Api.get('/talleres'), Api.get('/categorias')]);
        document.getElementById('fTaller').insertAdjacentHTML('beforeend', tals.map((t) => `<option value="${t.id}">${UI.esc(t.nombre)}</option>`).join(''));
        document.getElementById('fCategoria').insertAdjacentHTML('beforeend', cats.map((c) => `<option value="${c.id}">${UI.esc(c.nombre)}</option>`).join(''));
      } catch (e) {}
    })();

    // Aplica filtro de estado si viene en la URL
    const qs = new URLSearchParams(location.search);
    if (qs.get('estado')) document.getElementById('fEstado').value = qs.get('estado');

    ['q'].forEach((id) => document.getElementById(id).addEventListener('input', () => {
      clearTimeout(debounce); debounce = setTimeout(() => { page = 1; cargar(); }, 350);
    }));
    ['fEstado', 'fTaller', 'fCategoria'].forEach((id) => document.getElementById(id).addEventListener('change', () => { page = 1; cargar(); }));
    document.getElementById('prev').onclick = () => { if (page > 1) { page--; cargar(); } };
    document.getElementById('next').onclick = () => { if (page < totalPaginas) { page++; cargar(); } };

    function params() {
      const p = new URLSearchParams();
      const q = document.getElementById('q').value.trim();
      const e = document.getElementById('fEstado').value;
      const t = document.getElementById('fTaller').value;
      const c = document.getElementById('fCategoria').value;
      if (q) p.set('q', q);
      if (e) p.set('estado', e);
      if (t) p.set('taller_id', t);
      if (c) p.set('categoria_id', c);
      p.set('page', page); p.set('limit', vista === 'cards' ? 24 : 25);
      return p.toString();
    }

    async function cargar() {
      const cont = document.getElementById('resultados');
      cont.innerHTML = vista === 'table' ? esqueletoTabla() : esqueletoCards();
      try {
        const r = await Api.get('/activos?' + params());
        totalPaginas = r.paginacion.totalPaginas || 1;
        if (!r.data.length) { cont.innerHTML = vacio(); document.getElementById('pager').style.display = 'none'; return; }
        cont.innerHTML = vista === 'table' ? tabla(r.data) : cards(r.data);
        actualizarPager(r.paginacion);
      } catch (e) {
        cont.innerHTML = `<div class="empty">${ICON.alert}<h3>No se pudo cargar el inventario</h3><p>${UI.esc(e.message)}</p></div>`;
      }
    }

    function cards(rows) {
      return '<div class="assets-grid">' + rows.map((a) => {
        const cls = UI.estadoClase(a.estado);
        const img = a.foto_principal_url
          ? `<img src="${UI.esc(a.foto_principal_url)}" loading="lazy" alt="">`
          : `<div class="ph">${ICON.image}</div>`;
        return `
          <div class="asset-card ${cls}" onclick="location.href='activo-detalle.html?id=${a.id}'">
            <div class="thumb">${img}<div class="ac-state">${UI.badge(a.estado)}</div></div>
            <div class="ac-body">
              <div class="ac-code">${UI.esc(a.codigo_interno)}</div>
              <div class="ac-name">${UI.esc(a.nombre)}</div>
              <div class="ac-meta">
                <span>${UI.esc([a.marca, a.modelo].filter(Boolean).join(' ') || 'Sin marca')}</span>
                <span>${UI.esc(a.taller_nombre || 'Sin taller')} · ${UI.esc(a.categoria_nombre || 'Sin categoría')}</span>
              </div>
            </div>
          </div>`;
      }).join('') + '</div>';
    }

    function tabla(rows) {
      return `<div class="panel"><div class="table-wrap"><table class="data">
        <thead><tr><th>Código</th><th>Activo</th><th>Categoría</th><th>Taller</th><th>Cant.</th><th>Estado</th><th></th></tr></thead>
        <tbody>${rows.map((a) => `
          <tr style="cursor:pointer" onclick="location.href='activo-detalle.html?id=${a.id}'">
            <td><span class="code-chip">${UI.esc(a.codigo_interno)}</span></td>
            <td class="t-strong">${UI.esc(a.nombre)}<div class="t-sub">${UI.esc([a.marca, a.modelo].filter(Boolean).join(' '))}</div></td>
            <td>${UI.esc(a.categoria_nombre || '—')}</td>
            <td>${UI.esc(a.taller_nombre || '—')}</td>
            <td>${a.cantidad ?? 1}</td>
            <td>${UI.badge(a.estado)}</td>
            <td class="text-r"><span style="color:var(--muted-2);display:inline-flex"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></span></td>
          </tr>`).join('')}</tbody>
      </table></div></div>`;
    }

    function actualizarPager(p) {
      const pager = document.getElementById('pager');
      pager.style.display = totalPaginas > 1 ? 'flex' : (p.total > 0 ? 'flex' : 'none');
      const desde = (p.page - 1) * p.limit + 1;
      const hasta = Math.min(p.page * p.limit, p.total);
      document.getElementById('pagerInfo').textContent = `Mostrando ${desde}–${hasta} de ${p.total} activos`;
      document.getElementById('pagNum').textContent = `Página ${p.page} de ${p.totalPaginas}`;
      document.getElementById('prev').disabled = p.page <= 1;
      document.getElementById('next').disabled = p.page >= p.totalPaginas;
    }

    function vacio() {
      const conFiltros = document.getElementById('q').value || document.getElementById('fEstado').value || document.getElementById('fTaller').value || document.getElementById('fCategoria').value;
      return `<div class="empty">${ICON.empty}<h3>${conFiltros ? 'Sin coincidencias' : 'Tu inventario está vacío'}</h3>
        <p>${conFiltros ? 'Prueba con otros términos o quita algunos filtros.' : 'Empieza registrando tu primer activo o impórtalos masivamente desde Excel.'}</p>
        ${!conFiltros && Auth.can('jefe_taller') ? `<button class="btn btn-primary" onclick="location.href='activo-form.html'">${ICON.plus}<span>Registrar activo</span></button>` : ''}</div>`;
    }

    function esqueletoCards() {
      let c = '';
      for (let i = 0; i < 8; i++) c += `<div class="asset-card"><div class="thumb"><div class="skel" style="width:100%;height:100%"></div></div><div class="ac-body"><div class="skel" style="height:11px;width:40%;margin-bottom:8px"></div><div class="skel" style="height:15px;width:75%;margin-bottom:10px"></div><div class="skel" style="height:12px;width:90%"></div></div></div>`;
      return '<div class="assets-grid">' + c + '</div>';
    }
    function esqueletoTabla() {
      return `<div class="panel"><div class="table-wrap"><table class="data"><thead><tr><th>Código</th><th>Activo</th><th>Categoría</th><th>Taller</th><th>Cant.</th><th>Estado</th><th></th></tr></thead><tbody>${UI.skelRows(7, 8)}</tbody></table></div></div>`;
    }

    cargar();
  </script>
</body>
</html>
