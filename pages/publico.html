<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Ficha del activo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#eef1f5; --surface:#ffffff; --line:#dfe4ea; --line-2:#e9edf2;
      --ink:#10151c; --ink-2:#2b3440; --muted:#5b6675; --muted-2:#8b94a3;
      --primary:#1f6feb; --primary-d:#1a5fcc;
      --op:#15803d; --op-bg:#e9f7ee; --op-line:#bfe6cd;
      --mant:#b45309; --mant-bg:#fdf3e3; --mant-line:#f3dcae;
      --baja:#b91c1c; --baja-bg:#fdeceb; --baja-line:#f4c9c6;
      --radius:16px; --shadow:0 1px 2px rgba(16,24,40,.06),0 8px 24px rgba(16,24,40,.06);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      background:var(--bg); color:var(--ink); line-height:1.5;
      min-height:100vh; -webkit-font-smoothing:antialiased;
      padding:18px 14px 40px;
    }
    .wrap{max-width:520px;margin:0 auto}
    .inst{
      display:flex;align-items:center;gap:11px;margin-bottom:16px;padding:0 2px;
    }
    .inst .logo{
      width:42px;height:42px;border-radius:11px;background:var(--surface);
      border:1px solid var(--line);display:grid;place-items:center;overflow:hidden;flex-shrink:0;
      font-family:'Space Grotesk',sans-serif;font-weight:700;color:var(--primary);font-size:15px;
    }
    .inst .logo svg{width:100%;height:100%}
    .inst .it{min-width:0}
    .inst .it h2{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;color:var(--ink);line-height:1.25;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .inst .it span{font-size:12px;color:var(--muted)}

    .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
      box-shadow:var(--shadow);overflow:hidden}
    .topband{height:6px;background:var(--primary)}
    .topband.op{background:var(--op)} .topband.mant{background:var(--mant)} .topband.baja{background:var(--baja)}

    .photo{width:100%;aspect-ratio:4/3;background:#f1f4f8;display:grid;place-items:center;overflow:hidden;
      border-bottom:1px solid var(--line-2)}
    .photo img{width:100%;height:100%;object-fit:cover;display:block}
    .photo .noimg{color:var(--muted-2);display:flex;flex-direction:column;align-items:center;gap:8px;font-size:13px}
    .photo .noimg svg{width:40px;height:40px}

    .pad{padding:20px}
    .code{display:inline-block;font-family:'Space Mono',monospace;font-size:13px;font-weight:700;
      color:var(--primary-d);background:#eef4ff;border:1px solid #d6e4fd;padding:4px 10px;border-radius:7px;letter-spacing:.02em}
    .name{font-family:'Space Grotesk',sans-serif;font-size:23px;font-weight:600;letter-spacing:-.01em;
      margin:12px 0 4px;line-height:1.2}
    .sub{color:var(--muted);font-size:14.5px;margin-bottom:14px}

    .badge{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:600;
      padding:5px 13px;border-radius:999px;border:1px solid transparent}
    .badge .dot{width:8px;height:8px;border-radius:50%;background:currentColor}
    .badge.op{color:var(--op);background:var(--op-bg);border-color:var(--op-line)}
    .badge.mant{color:var(--mant);background:var(--mant-bg);border-color:var(--mant-line)}
    .badge.baja{color:var(--baja);background:var(--baja-bg);border-color:var(--baja-line)}

    .specs{margin-top:18px;border-top:1px solid var(--line-2);padding-top:6px}
    .row{display:flex;justify-content:space-between;gap:16px;padding:11px 0;border-bottom:1px solid var(--line-2)}
    .row:last-child{border-bottom:none}
    .row .l{color:var(--muted);font-size:13.5px;font-weight:500;flex-shrink:0}
    .row .v{color:var(--ink-2);font-size:14px;font-weight:600;text-align:right}
    .row .v.mono{font-family:'Space Mono',monospace;font-weight:700;font-size:13px}

    .care{margin:18px 20px 0;background:#fbf8ee;border:1px solid #ece3c4;border-radius:12px;padding:14px 16px}
    .care h3{font-size:12.5px;text-transform:uppercase;letter-spacing:.05em;color:#7c4a08;
      display:flex;align-items:center;gap:7px;margin-bottom:8px;font-weight:700}
    .care h3 svg{width:16px;height:16px}
    .care p{font-size:14px;color:#5d4a1f;white-space:pre-wrap}

    .foot{text-align:center;margin-top:22px;color:var(--muted-2);font-size:12px;padding:0 10px}
    .foot .pill{display:inline-flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--line);
      padding:6px 12px;border-radius:999px;color:var(--muted);font-weight:600;margin-bottom:10px}
    .foot .pill svg{width:14px;height:14px}

    .state-center{padding:20px 20px 0}

    /* Estados de carga / error */
    .msg{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
      box-shadow:var(--shadow);padding:46px 26px;text-align:center;margin-top:10px}
    .msg svg{width:48px;height:48px;color:var(--muted-2);margin-bottom:14px}
    .msg h2{font-family:'Space Grotesk',sans-serif;font-size:20px;margin-bottom:8px}
    .msg p{color:var(--muted);font-size:14.5px;max-width:340px;margin:0 auto}
    .skel{background:linear-gradient(100deg,#eef1f5 30%,#f6f8fb 50%,#eef1f5 70%);
      background-size:200% 100%;animation:sh 1.3s infinite;border-radius:8px}
    @keyframes sh{to{background-position:-200% 0}}
    @media (prefers-reduced-motion:reduce){.skel{animation:none}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="inst" id="inst" style="visibility:hidden">
      <div class="logo" id="instLogo">IT</div>
      <div class="it">
        <h2 id="instName">Inventario de Talleres</h2>
        <span id="instSub">Ficha pública del activo</span>
      </div>
    </div>

    <div id="contenido">
      <div class="card">
        <div class="topband"></div>
        <div class="photo"><div class="skel" style="width:100%;height:100%"></div></div>
        <div class="pad">
          <div class="skel" style="height:22px;width:35%;margin-bottom:14px"></div>
          <div class="skel" style="height:24px;width:75%;margin-bottom:10px"></div>
          <div class="skel" style="height:15px;width:55%"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="../config.js"></script>
  <script>
    const ICON_IMG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.1-3.1a2 2 0 0 0-2.8 0L6 21"/></svg>';
    const ICON_WRENCH = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>';
    const ICON_QR = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="5" height="5"/><rect x="16" y="3" width="5" height="5"/><rect x="3" y="16" width="5" height="5"/><path d="M21 16h-3a2 2 0 0 0-2 2v3"/><path d="M12 7v3a2 2 0 0 1-2 2H7"/></svg>';
    const ICON_ALERT = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>';

    function esc(s){ if(s==null) return ''; return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
    const ESTADO = { operativo:['op','Operativo'], mantenimiento:['mant','En mantenimiento'], baja:['baja','Dado de baja'] };

    function rowHTML(label, value, mono){
      if(!value) return '';
      return `<div class="row"><span class="l">${esc(label)}</span><span class="v${mono?' mono':''}">${esc(value)}</span></div>`;
    }

    function pintar(a){
      const [cls,label] = ESTADO[a.estado] || ['op', a.estado];
      const marcaModelo = [a.marca, a.modelo].filter(Boolean).join(' ');
      const foto = a.foto_principal_url
        ? `<img src="${esc(a.foto_principal_url)}" alt="${esc(a.nombre)}" loading="eager">`
        : `<div class="noimg">${ICON_IMG}<span>Sin fotografía</span></div>`;

      document.getElementById('contenido').innerHTML = `
        <div class="card">
          <div class="topband ${cls}"></div>
          <div class="photo">${foto}</div>
          <div class="state-center"><span class="badge ${cls}"><span class="dot"></span>${esc(label)}</span></div>
          <div class="pad">
            <span class="code">${esc(a.codigo_interno || '—')}</span>
            <h1 class="name">${esc(a.nombre)}</h1>
            ${a.categoria_nombre ? `<div class="sub">${esc(a.categoria_nombre)}</div>` : ''}
            <div class="specs">
              ${rowHTML('Marca / Modelo', marcaModelo)}
              ${rowHTML('Código interno', a.codigo_interno, true)}
              ${rowHTML('Ubicación', a.taller_nombre)}
            </div>
          </div>
          ${a.cuidado_mantenimiento ? `
            <div class="care">
              <h3>${ICON_WRENCH} Cuidados y mantenimiento</h3>
              <p>${esc(a.cuidado_mantenimiento)}</p>
            </div>
            <div style="height:20px"></div>` : '<div style="height:4px"></div>'}
        </div>
        <div class="foot">
          <div class="pill">${ICON_QR} Información verificada por QR</div>
          <div id="footName"></div>
        </div>`;

      const c = window.__cfg;
      if (c && c.nombre_institucion) document.getElementById('footName').textContent = c.nombre_institucion;
    }

    function error(titulo, detalle){
      document.getElementById('contenido').innerHTML = `
        <div class="msg">${ICON_ALERT}<h2>${esc(titulo)}</h2><p>${esc(detalle)}</p></div>`;
    }

    // Branding opcional (no bloquea la carga del activo)
    async function cargarBranding(){
      try{
        const r = await fetch(API_BASE_URL + '/config');
        if(!r.ok) return;
        const c = await r.json();
        window.__cfg = c;
        const inst = document.getElementById('inst');
        if (c.color_primario){
          document.documentElement.style.setProperty('--primary', c.color_primario);
          document.documentElement.style.setProperty('--primary-d', c.color_primario);
        }
        if (c.nombre_institucion) document.getElementById('instName').textContent = c.nombre_institucion;
        document.getElementById('instSub').textContent = 'Ficha pública del activo';
        if (c.logo_svg && c.logo_svg.toLowerCase().includes('<svg')){
          const box = document.getElementById('instLogo'); box.innerHTML = c.logo_svg; box.style.background='transparent';
        } else if (c.nombre_institucion){
          document.getElementById('instLogo').textContent = c.nombre_institucion.trim().slice(0,2).toUpperCase();
        }
        inst.style.visibility = 'visible';
      }catch(e){ /* sin branding, no pasa nada */ }
    }

    async function cargarActivo(){
      const token = new URLSearchParams(location.search).get('token');
      if(!token){ error('Código no válido', 'Este enlace no contiene un identificador de activo. Escanea nuevamente el código QR.'); return; }
      try{
        const r = await fetch(API_BASE_URL + '/publico/' + encodeURIComponent(token));
        if(r.status === 404){ error('Activo no encontrado', 'El código escaneado no corresponde a ningún activo registrado. Es posible que haya sido dado de baja.'); return; }
        if(!r.ok) throw new Error('Error ' + r.status);
        const a = await r.json();
        document.title = a.nombre + ' · Ficha';
        pintar(a);
      }catch(e){
        error('No se pudo cargar la ficha', 'Verifica tu conexión a internet e inténtalo de nuevo.');
      }
    }

    cargarBranding();
    cargarActivo();
  </script>
</body>
</html>
