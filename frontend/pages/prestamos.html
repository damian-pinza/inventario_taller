<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Préstamos · Talleres</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main">
      <header class="topbar" id="topbar"></header>
      <main class="content">

        <div class="toolbar">
          <div class="search">
            <span id="searchIcon"></span>
            <input type="search" id="q" placeholder="Buscar por receptor…">
          </div>
          <select id="fEstado" style="width:auto;min-width:160px">
            <option value="">Todos los estados</option>
            <option value="activo">Prestado</option>
            <option value="vencido">Vencido</option>
            <option value="devuelto">Devuelto</option>
          </select>
          <span class="muted small" id="filtroActivo" style="display:none"></span>
          <div class="spacer" style="flex:1"></div>
          <button class="btn btn-ghost" id="btnExcel"></button>
          <button class="btn btn-ghost" id="btnPdf"></button>
          <button class="btn btn-primary" id="btnNuevo" style="display:none"></button>
        </div>

        <div id="resultados"></div>

      </main>
    </div>
  </div>

  <!-- Modal nuevo préstamo -->
  <div class="modal-bg" id="modalNuevo">
    <div class="modal">
      <div class="modal-head"><h3>Registrar préstamo</h3><button class="icon-btn x-close" data-close></button></div>
      <div class="modal-body">
        <div class="field">
          <label>Activo <span class="req">*</span></label>
          <input type="search" id="mActivoFiltro" placeholder="Filtrar por código o nombre…" style="margin-bottom:8px">
          <select id="mActivo" size="1"></select>
          <div class="hint">Solo se listan activos operativos disponibles.</div>
        </div>
        <div class="form-grid">
          <div class="field col-2">
            <label>Nombre del receptor <span class="req">*</span></label>
            <input type="text" id="mReceptor" placeholder="Ej. Juan Pérez">
          </div>
          <div class="field col-2">
            <label>Cargo / área del receptor</label>
            <input type="text" id="mCargo" placeholder="Ej. Docente de Mecánica">
          </div>
          <div class="field">
            <label>Fecha de entrega</label>
            <input type="datetime-local" id="mEntrega">
          </div>
          <div class="field">
            <label>Devolución esperada</label>
            <input type="date" id="mEsperada">
          </div>
          <div class="field col-2">
            <label>Observaciones</label>
            <textarea id="mObs" rows="2" placeholder="Estado del equipo, accesorios entregados, etc."></textarea>
          </div>
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn btn-ghost" data-close>Cancelar</button>
        <button class="btn btn-primary" id="mGuardar">Registrar préstamo</button>
      </div>
    </div>
  </div>

  <script src="../config.js"></script>
  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/ui.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/app.js"></script>
  <script>
    Shell.init({ active: 'prestamos', title: 'Préstamos' });

    document.getElementById('searchIcon').outerHTML = `<span>${ICON.search}</span>`;
    document.getElementById('btnExcel').innerHTML = ICON.excel + '<span>Excel</span>';
    document.getElementById('btnPdf').innerHTML = ICON.pdf + '<span>PDF</span>';
    document.getElementById('btnNuevo').innerHTML = ICON.plus + '<span>Registrar préstamo</span>';

    const puedeRegistrar = Auth.can('docente');
    if (puedeRegistrar) document.getElementById('btnNuevo').style.display = '';

    const PBADGE = {
      activo:   ['mant', 'Prestado'],
      vencido:  ['baja', 'Vencido'],
      devuelto: ['op',   'Devuelto']
    };
    function pbadge(e){ const [c,l] = PBADGE[e] || ['neutral', e]; return `<span class="badge ${c}"><span class="dot"></span>${l}</span>`; }

    const qs = new URLSearchParams(location.search);
    const activoFiltroId = qs.get('activo');
    if (qs.get('estado')) document.getElementById('fEstado').value = qs.get('estado');

    let debounce;
    document.getElementById('q').addEventListener('input', () => { clearTimeout(debounce); debounce = setTimeout(cargar, 350); });
    document.getElementById('fEstado').addEventListener('change', cargar);
    document.getElementById('btnExcel').onclick = () => exportar('excel');
    document.getElementById('btnPdf').onclick = () => exportar('pdf');

    async function exportar(formato){
      try { await Api.download('/reportes/prestamos?formato=' + formato, 'historial_prestamos.' + (formato === 'excel' ? 'xlsx' : 'pdf')); }
      catch (e) { UI.toast(e.message, 'err'); }
    }

    function params(){
      const p = new URLSearchParams();
      const q = document.getElementById('q').value.trim();
      const e = document.getElementById('fEstado').value;
      if (q) p.set('receptor', q);
      if (e) p.set('estado', e);
      if (activoFiltroId) p.set('activo_id', activoFiltroId);
      return p.toString();
    }

    async function cargar(){
      const cont = document.getElementById('resultados');
      cont.innerHTML = esqueleto();
      try {
        const rows = await Api.get('/prestamos' + (params() ? '?' + params() : ''));
        if (activoFiltroId && rows[0]) {
          const fa = document.getElementById('filtroActivo');
          fa.style.display = ''; fa.textContent = 'Activo: ' + rows[0].codigo_interno;
        }
        if (!rows.length) { cont.innerHTML = vacio(); return; }
        cont.innerHTML = tabla(rows);
      } catch (e) {
        cont.innerHTML = `<div class="empty">${ICON.alert}<h3>No se pudieron cargar los préstamos</h3><p>${UI.esc(e.message)}</p></div>`;
      }
    }

    function tabla(rows){
      return `<div class="panel"><div class="table-wrap"><table class="data">
        <thead><tr><th>Activo</th><th>Receptor</th><th>Entrega</th><th>Devolución esperada</th><th>Estado</th><th></th></tr></thead>
        <tbody>${rows.map(p => `
          <tr>
            <td class="t-strong"><a href="activo-detalle.html?id=${p.activo_id}" style="color:inherit;text-decoration:none">${UI.esc(p.activo_nombre)}</a>
              <div class="t-sub"><span class="code-chip">${UI.esc(p.codigo_interno)}</span></div></td>
            <td>${UI.esc(p.receptor_nombre)}<div class="t-sub">${UI.esc(p.receptor_cargo || '')}</div></td>
            <td>${UI.datetime(p.fecha_entrega)}</td>
            <td>${p.fecha_devolucion_esperada ? UI.date(p.fecha_devolucion_esperada) : '—'}</td>
            <td>${pbadge(p.estado)}</td>
            <td class="text-r">${p.estado !== 'devuelto' && puedeRegistrar
              ? `<button class="btn btn-ghost btn-sm" onclick="devolver(${p.id})">${ICON.check}<span>Devolver</span></button>`
              : (p.fecha_devolucion_real ? `<span class="small muted">Dev. ${UI.date(p.fecha_devolucion_real)}</span>` : '')}</td>
          </tr>`).join('')}</tbody>
      </table></div></div>`;
    }

    async function devolver(id){
      const ok = await UI.confirm('¿Confirmas la devolución de este activo? Volverá a quedar disponible.', { titulo: 'Registrar devolución', ok: 'Sí, devolver' });
      if (!ok) return;
      try { await Api.put('/prestamos/' + id + '/devolver'); UI.toast('Devolución registrada.', 'ok'); cargar(); }
      catch (e) { UI.toast(e.message, 'err'); }
    }
    window.devolver = devolver;

    function vacio(){
      const filtros = document.getElementById('q').value || document.getElementById('fEstado').value || activoFiltroId;
      return `<div class="empty">${ICON.handshake}<h3>${filtros ? 'Sin préstamos que coincidan' : 'Aún no hay préstamos registrados'}</h3>
        <p>${filtros ? 'Ajusta los filtros para ver más resultados.' : 'Registra la entrega de un equipo para llevar control de quién lo tiene y cuándo debe devolverlo.'}</p>
        ${!filtros && puedeRegistrar ? `<button class="btn btn-primary" onclick="abrirNuevo()">${ICON.plus}<span>Registrar préstamo</span></button>` : ''}</div>`;
    }

    function esqueleto(){
      return `<div class="panel"><div class="table-wrap"><table class="data"><thead><tr><th>Activo</th><th>Receptor</th><th>Entrega</th><th>Devolución esperada</th><th>Estado</th><th></th></tr></thead><tbody>${UI.skelRows(6, 6)}</tbody></table></div></div>`;
    }

    // ---------- Modal nuevo ----------
    let activosCache = [];
    async function precargarActivos(){
      try {
        const r = await Api.get('/activos?estado=operativo&limit=1000');
        activosCache = r.data || [];
        pintarOpciones('');
      } catch (e) {}
    }
    function pintarOpciones(filtro){
      const f = filtro.trim().toLowerCase();
      const lista = !f ? activosCache : activosCache.filter(a =>
        (a.codigo_interno || '').toLowerCase().includes(f) || (a.nombre || '').toLowerCase().includes(f));
      const sel = document.getElementById('mActivo');
      sel.innerHTML = lista.length
        ? lista.slice(0, 300).map(a => `<option value="${a.id}">${UI.esc(a.codigo_interno)} — ${UI.esc(a.nombre)}</option>`).join('')
        : '<option value="" disabled>Sin coincidencias</option>';
    }
    document.getElementById('mActivoFiltro').addEventListener('input', (e) => pintarOpciones(e.target.value));

    function abrirNuevo(){
      document.getElementById('mActivoFiltro').value = '';
      document.getElementById('mReceptor').value = '';
      document.getElementById('mCargo').value = '';
      document.getElementById('mObs').value = '';
      document.getElementById('mEsperada').value = '';
      const now = new Date(); now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
      document.getElementById('mEntrega').value = now.toISOString().slice(0, 16);
      pintarOpciones('');
      UI.openModal('modalNuevo');
    }
    window.abrirNuevo = abrirNuevo;
    document.getElementById('btnNuevo').onclick = abrirNuevo;
    document.querySelectorAll('#modalNuevo [data-close]').forEach(b => b.onclick = () => UI.closeModal('modalNuevo'));

    document.getElementById('mGuardar').onclick = async () => {
      const activo_id = document.getElementById('mActivo').value;
      const receptor_nombre = document.getElementById('mReceptor').value.trim();
      if (!activo_id) { UI.toast('Selecciona un activo.', 'warn'); return; }
      if (!receptor_nombre) { UI.toast('El nombre del receptor es obligatorio.', 'warn'); return; }
      const entrega = document.getElementById('mEntrega').value;
      const body = {
        activo_id: Number(activo_id),
        receptor_nombre,
        receptor_cargo: document.getElementById('mCargo').value.trim() || null,
        fecha_entrega: entrega ? entrega.replace('T', ' ') + ':00' : null,
        fecha_devolucion_esperada: document.getElementById('mEsperada').value || null,
        observaciones: document.getElementById('mObs').value.trim() || null
      };
      const btn = document.getElementById('mGuardar'); btn.disabled = true;
      try {
        await Api.post('/prestamos', body);
        UI.closeModal('modalNuevo');
        UI.toast('Préstamo registrado.', 'ok');
        cargar();
      } catch (e) { UI.toast(e.message, 'err'); }
      finally { btn.disabled = false; }
    };

    document.getElementById('btnExcel').onclick = () => exportar('excel');
    document.getElementById('btnPdf').onclick = () => exportar('pdf');

    if (puedeRegistrar) precargarActivos();
    cargar();
  </script>
</body>
</html>
