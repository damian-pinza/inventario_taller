<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mantenimiento · Talleres</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main">
      <header class="topbar" id="topbar"></header>
      <main class="content">

        <div class="toolbar">
          <div class="pill-tabs" id="tabs">
            <button data-f="todos" class="active">Todos</button>
            <button data-f="proximos">Próximos a vencer</button>
          </div>
          <select id="fTipo" style="width:auto;min-width:150px">
            <option value="">Todos los tipos</option>
            <option value="preventivo">Preventivo</option>
            <option value="correctivo">Correctivo</option>
          </select>
          <select id="fEstado" style="width:auto;min-width:160px">
            <option value="">Todos los estados</option>
            <option value="programado">Programado</option>
            <option value="en_proceso">En proceso</option>
            <option value="completado">Completado</option>
          </select>
          <span class="muted small" id="filtroActivo" style="display:none"></span>
          <div class="spacer" style="flex:1"></div>
          <button class="btn btn-primary" id="btnNuevo" style="display:none"></button>
        </div>

        <div id="resultados"></div>

      </main>
    </div>
  </div>

  <!-- Modal mantenimiento -->
  <div class="modal-bg" id="modalMant">
    <div class="modal">
      <div class="modal-head"><h3 id="modalTitulo">Registrar mantenimiento</h3><button class="icon-btn x-close" data-close></button></div>
      <div class="modal-body">
        <div class="field" id="wrapActivo">
          <label>Activo <span class="req">*</span></label>
          <input type="search" id="mActivoFiltro" placeholder="Filtrar por código o nombre…" style="margin-bottom:8px">
          <select id="mActivo"></select>
        </div>
        <div id="activoFijo" style="display:none" class="alert info" ></div>
        <div class="form-grid">
          <div class="field">
            <label>Tipo <span class="req">*</span></label>
            <select id="mTipo">
              <option value="preventivo">Preventivo</option>
              <option value="correctivo">Correctivo</option>
            </select>
          </div>
          <div class="field">
            <label>Estado</label>
            <select id="mEstado">
              <option value="programado">Programado</option>
              <option value="en_proceso">En proceso</option>
              <option value="completado">Completado</option>
            </select>
          </div>
          <div class="field">
            <label>Fecha de inicio</label>
            <input type="date" id="mInicio">
          </div>
          <div class="field">
            <label>Fecha de fin</label>
            <input type="date" id="mFin">
          </div>
          <div class="field">
            <label>Próximo mantenimiento</label>
            <input type="date" id="mProxima">
          </div>
          <div class="field">
            <label>Costo (USD)</label>
            <input type="number" step="0.01" min="0" id="mCosto" placeholder="0.00">
          </div>
          <div class="field col-2">
            <label>Técnico responsable</label>
            <input type="text" id="mTecnico" placeholder="Nombre del técnico o proveedor">
          </div>
          <div class="field col-2">
            <label>Descripción del trabajo</label>
            <textarea id="mDescripcion" rows="3" placeholder="Detalle de la intervención realizada o planificada"></textarea>
          </div>
        </div>
        <div class="alert warn" id="avisoEstado" style="display:none"></div>
      </div>
      <div class="modal-foot">
        <button class="btn btn-ghost" data-close>Cancelar</button>
        <button class="btn btn-primary" id="mGuardar">Guardar</button>
      </div>
    </div>
  </div>

  <script src="../config.js"></script>
  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/ui.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/app.js"></script>
  <script>
    Shell.init({ active: 'mantenimiento', title: 'Mantenimiento' });

    document.getElementById('btnNuevo').innerHTML = ICON.plus + '<span>Nuevo mantenimiento</span>';
    const puedeGestionar = Auth.can('jefe_taller');
    if (puedeGestionar) document.getElementById('btnNuevo').style.display = '';

    const MBADGE = {
      programado: ['neutral', 'Programado'],
      en_proceso: ['mant', 'En proceso'],
      completado: ['op', 'Completado']
    };
    function mbadge(e){ const [c,l] = MBADGE[e] || ['neutral', e]; return `<span class="badge ${c}"><span class="dot"></span>${l}</span>`; }
    function tipoLabel(t){ return t === 'correctivo' ? 'Correctivo' : 'Preventivo'; }

    const qs = new URLSearchParams(location.search);
    const activoFiltroId = qs.get('activo');
    let filtroProximos = false;

    document.querySelectorAll('#tabs button').forEach(b => b.onclick = () => {
      document.querySelectorAll('#tabs button').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      filtroProximos = b.dataset.f === 'proximos';
      cargar();
    });
    document.getElementById('fTipo').addEventListener('change', cargar);
    document.getElementById('fEstado').addEventListener('change', cargar);

    function params(){
      const p = new URLSearchParams();
      if (activoFiltroId) p.set('activo_id', activoFiltroId);
      if (filtroProximos) p.set('proximos', 'true');
      return p.toString();
    }

    function diasRestantes(fecha){
      if (!fecha) return null;
      const hoy = new Date(); hoy.setHours(0,0,0,0);
      const f = new Date(fecha); f.setHours(0,0,0,0);
      return Math.round((f - hoy) / 86400000);
    }

    async function cargar(){
      const cont = document.getElementById('resultados');
      cont.innerHTML = esqueleto();
      try {
        let rows = await Api.get('/mantenimientos' + (params() ? '?' + params() : ''));
        // Filtros cliente (tipo / estado)
        const ft = document.getElementById('fTipo').value;
        const fe = document.getElementById('fEstado').value;
        if (ft) rows = rows.filter(m => m.tipo === ft);
        if (fe) rows = rows.filter(m => m.estado === fe);

        if (activoFiltroId && rows[0]) {
          const fa = document.getElementById('filtroActivo');
          fa.style.display = ''; fa.textContent = 'Activo: ' + rows[0].codigo_interno;
        }
        if (!rows.length) { cont.innerHTML = vacio(); return; }
        cont.innerHTML = tabla(rows);
      } catch (e) {
        cont.innerHTML = `<div class="empty">${ICON.alert}<h3>No se pudo cargar el mantenimiento</h3><p>${UI.esc(e.message)}</p></div>`;
      }
    }

    function tabla(rows){
      return `<div class="panel"><div class="table-wrap"><table class="data">
        <thead><tr><th>Activo</th><th>Tipo</th><th>Inicio</th><th>Técnico</th><th>Próximo</th><th>Estado</th>${puedeGestionar ? '<th></th>' : ''}</tr></thead>
        <tbody>${rows.map(m => {
          const dias = diasRestantes(m.proxima_fecha);
          let prox = m.proxima_fecha ? UI.date(m.proxima_fecha) : '—';
          if (dias !== null && m.estado !== 'completado') {
            if (dias < 0) prox += ` <span class="badge baja" style="padding:1px 7px;font-size:11px">vencido</span>`;
            else if (dias <= 15) prox += ` <span class="badge mant" style="padding:1px 7px;font-size:11px">${dias}d</span>`;
          }
          return `
          <tr>
            <td class="t-strong"><a href="activo-detalle.html?id=${m.activo_id}" style="color:inherit;text-decoration:none">${UI.esc(m.activo_nombre)}</a>
              <div class="t-sub"><span class="code-chip">${UI.esc(m.codigo_interno)}</span></div></td>
            <td>${tipoLabel(m.tipo)}</td>
            <td>${m.fecha_inicio ? UI.date(m.fecha_inicio) : '—'}</td>
            <td>${UI.esc(m.tecnico_responsable || '—')}</td>
            <td>${prox}</td>
            <td>${mbadge(m.estado)}</td>
            ${puedeGestionar ? `<td class="text-r"><button class="icon-btn" title="Editar" onclick='editar(${m.id})'>${ICON.edit}</button></td>` : ''}
          </tr>`; }).join('')}</tbody>
      </table></div></div>`;
    }

    function vacio(){
      const filtros = filtroProximos || document.getElementById('fTipo').value || document.getElementById('fEstado').value || activoFiltroId;
      return `<div class="empty">${ICON.wrench}<h3>${filtros ? 'Sin mantenimientos que coincidan' : 'No hay mantenimientos registrados'}</h3>
        <p>${filtros ? 'Ajusta los filtros para ver más resultados.' : 'Programa mantenimientos preventivos y registra los correctivos para mantener tus equipos operativos.'}</p>
        ${!filtros && puedeGestionar ? `<button class="btn btn-primary" onclick="abrirNuevo()">${ICON.plus}<span>Nuevo mantenimiento</span></button>` : ''}</div>`;
    }

    function esqueleto(){
      return `<div class="panel"><div class="table-wrap"><table class="data"><thead><tr><th>Activo</th><th>Tipo</th><th>Inicio</th><th>Técnico</th><th>Próximo</th><th>Estado</th><th></th></tr></thead><tbody>${UI.skelRows(7, 6)}</tbody></table></div></div>`;
    }

    // ---------- Modal ----------
    let activosCache = [], editId = null, registros = {};
    async function precargarActivos(){
      try { const r = await Api.get('/activos?limit=1000'); activosCache = r.data || []; pintarOpciones(''); } catch (e) {}
    }
    function pintarOpciones(filtro){
      const f = filtro.trim().toLowerCase();
      const lista = !f ? activosCache : activosCache.filter(a =>
        (a.codigo_interno || '').toLowerCase().includes(f) || (a.nombre || '').toLowerCase().includes(f));
      const sel = document.getElementById('mActivo');
      sel.innerHTML = lista.length
        ? lista.slice(0, 300).map(a => `<option value="${a.id}">${UI.esc(a.codigo_interno)} — ${UI.esc(a.nombre)}</option>`).join('')
        : '<option value="" disabled>Sin coincidencias</option>';
    }
    document.getElementById('mActivoFiltro').addEventListener('input', (e) => pintarOpciones(e.target.value));

    function avisoPorEstado(){
      const e = document.getElementById('mEstado').value;
      const box = document.getElementById('avisoEstado');
      if (e === 'en_proceso') { box.style.display = ''; box.innerHTML = ICON.info + '<span>Al marcar “En proceso”, el activo pasará a estado <b>En mantenimiento</b>.</span>'; }
      else if (e === 'completado') { box.style.display = ''; box.innerHTML = ICON.check + '<span>Al “Completar”, el activo volverá a estado <b>Operativo</b>.</span>'; }
      else box.style.display = 'none';
    }
    document.getElementById('mEstado').addEventListener('change', avisoPorEstado);

    function limpiarModal(){
      document.getElementById('mActivoFiltro').value = '';
      document.getElementById('mTipo').value = 'preventivo';
      document.getElementById('mEstado').value = 'programado';
      document.getElementById('mInicio').value = new Date().toISOString().slice(0,10);
      document.getElementById('mFin').value = '';
      document.getElementById('mProxima').value = '';
      document.getElementById('mCosto').value = '';
      document.getElementById('mTecnico').value = '';
      document.getElementById('mDescripcion').value = '';
      avisoPorEstado();
    }

    function abrirNuevo(){
      editId = null;
      document.getElementById('modalTitulo').textContent = 'Registrar mantenimiento';
      document.getElementById('wrapActivo').style.display = '';
      document.getElementById('activoFijo').style.display = 'none';
      limpiarModal();
      pintarOpciones('');
      if (activoFiltroId) document.getElementById('mActivo').value = activoFiltroId;
      UI.openModal('modalMant');
    }
    window.abrirNuevo = abrirNuevo;
    document.getElementById('btnNuevo').onclick = abrirNuevo;

    async function editar(id){
      try {
        // Reusar lo ya cargado en la tabla evita otra llamada; pero recargamos por seguridad.
        const rows = await Api.get('/mantenimientos' + (params() ? '?' + params() : ''));
        const m = rows.find(x => x.id === id);
        if (!m) { UI.toast('No se encontró el registro.', 'err'); return; }
        editId = id;
        document.getElementById('modalTitulo').textContent = 'Editar mantenimiento';
        document.getElementById('wrapActivo').style.display = 'none';
        const fijo = document.getElementById('activoFijo');
        fijo.style.display = ''; fijo.innerHTML = ICON.box + `<span><b>${UI.esc(m.codigo_interno)}</b> — ${UI.esc(m.activo_nombre)}</span>`;
        document.getElementById('mTipo').value = m.tipo;
        document.getElementById('mEstado').value = m.estado;
        document.getElementById('mInicio').value = m.fecha_inicio ? String(m.fecha_inicio).slice(0,10) : '';
        document.getElementById('mFin').value = m.fecha_fin ? String(m.fecha_fin).slice(0,10) : '';
        document.getElementById('mProxima').value = m.proxima_fecha ? String(m.proxima_fecha).slice(0,10) : '';
        document.getElementById('mCosto').value = m.costo ?? '';
        document.getElementById('mTecnico').value = m.tecnico_responsable || '';
        document.getElementById('mDescripcion').value = m.descripcion || '';
        avisoPorEstado();
        UI.openModal('modalMant');
      } catch (e) { UI.toast(e.message, 'err'); }
    }
    window.editar = editar;

    document.querySelectorAll('#modalMant [data-close]').forEach(b => b.onclick = () => UI.closeModal('modalMant'));

    document.getElementById('mGuardar').onclick = async () => {
      const body = {
        tipo: document.getElementById('mTipo').value,
        estado: document.getElementById('mEstado').value,
        fecha_inicio: document.getElementById('mInicio').value || null,
        fecha_fin: document.getElementById('mFin').value || null,
        proxima_fecha: document.getElementById('mProxima').value || null,
        costo: document.getElementById('mCosto').value || null,
        tecnico_responsable: document.getElementById('mTecnico').value.trim() || null,
        descripcion: document.getElementById('mDescripcion').value.trim() || null
      };
      const btn = document.getElementById('mGuardar'); btn.disabled = true;
      try {
        if (editId) {
          await Api.put('/mantenimientos/' + editId, body);
          UI.toast('Mantenimiento actualizado.', 'ok');
        } else {
          const activo_id = document.getElementById('mActivo').value;
          if (!activo_id) { UI.toast('Selecciona un activo.', 'warn'); btn.disabled = false; return; }
          body.activo_id = Number(activo_id);
          await Api.post('/mantenimientos', body);
          UI.toast('Mantenimiento registrado.', 'ok');
        }
        UI.closeModal('modalMant');
        cargar();
      } catch (e) { UI.toast(e.message, 'err'); }
      finally { btn.disabled = false; }
    };

    if (puedeGestionar) precargarActivos();
    cargar();
  </script>
</body>
</html>
